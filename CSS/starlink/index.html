<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starlink</title>
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header class="">
      <nav class="row flex-main-space-between flex-secondary-center">
        <div class="row flex-secondary-center gap-standard">
          <h2 id="logo">STARLINK</h2>
          <a class="link-menu" href="#">Residencial</a>
          <a class="link-menu" href="#">Itinerante</a>
        </div>
        <div class="row flex-secondary-center gap-standard">
          <div class="row flex-secondary-center gap-standard buttons-menu">
            <button class="button-active">Personal</button>
            <button class="transparent button-inactive">Empresa</button>
          </div>
          <button class="circular-button">
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>
      </nav>
      <div id="header-content">
        <div
          class="col-content flex column flex-secondary-center flex-main-center"
        >
          <div id="column-content" class="flex column">
            <h1>
              Fast, affordable <br />
              internet
            </h1>
            <p>STARTING AT</p>
            <h2>$55<span>/mo</span></h2>
            <div class="flex gap-standard">
              <button class="button-hightlight">Get Started</button>
              <button class="button-nohightlight">View Pricing</button>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
